<svg width="1280" height="440" viewBox="0 0 1280 440" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="FoundryBuild — Build Anything.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b0d10"/>
      <stop offset="1" stop-color="#08090b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="0%" r="70%">
      <stop stop-color="#56688c" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#56688c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#aab0bc"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="440" fill="url(#bg)"/>
  <rect width="1280" height="440" fill="url(#grid)"/>
  <rect width="1280" height="280" fill="url(#glow)"/>

  <!-- logo mark -->
  <g transform="translate(560,70)">
    <rect x="0" y="0" width="64" height="64" rx="14" fill="#121519" stroke="#2a2f37" stroke-width="1.5"/>
    <g transform="translate(32,32)" stroke="#e8ecf1" stroke-width="2.2" fill="none" stroke-linejoin="round">
      <path d="M0 -19 L16.5 -9.5 L16.5 9.5 L0 19 L-16.5 9.5 L-16.5 -9.5 Z"/>
      <path d="M0 -11 L0 11 M-9.5 -5.5 L9.5 5.5 M9.5 -5.5 L-9.5 5.5"/>
    </g>
  </g>

  <text x="640" y="220" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="84" font-weight="700" letter-spacing="-2" fill="url(#title)">Build Anything.</text>

  <text x="640" y="272" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="500" letter-spacing="0.5" fill="#8b919c">Turn ideas into buildable reality.</text>

  <!-- prompt bar -->
  <g transform="translate(390,318)">
    <rect x="0" y="0" width="500" height="56" rx="14" fill="#0d0f12" stroke="#2a2f37" stroke-width="1.5"/>
    <g transform="translate(22,28)" stroke="#5d636e" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 0 H16 M11 -5 L17 1 L11 7"/>
    </g>
    <text x="54" y="35" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#5d636e">Build a humanoid robot</text>
    <rect x="386" y="10" width="100" height="36" rx="9" fill="#e8ecf1"/>
    <text x="436" y="33" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="600" fill="#08090b">Generate</text>
  </g>

  <!-- tags -->
  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#8b919c">
    <g transform="translate(430,406)"><rect x="0" y="-15" width="86" height="24" rx="12" fill="#121519" stroke="#1c2026"/><text x="43" y="2" text-anchor="middle">Software</text></g>
    <g transform="translate(528,406)"><rect x="0" y="-15" width="78" height="24" rx="12" fill="#121519" stroke="#1c2026"/><text x="39" y="2" text-anchor="middle">Robotics</text></g>
    <g transform="translate(618,406)"><rect x="0" y="-15" width="92" height="24" rx="12" fill="#121519" stroke="#1c2026"/><text x="46" y="2" text-anchor="middle">AI Models</text></g>
    <g transform="translate(722,406)"><rect x="0" y="-15" width="98" height="24" rx="12" fill="#121519" stroke="#1c2026"/><text x="49" y="2" text-anchor="middle">Electronics</text></g>
  </g>
</svg>
